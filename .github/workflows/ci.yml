# App lives in twox-frontend-main/ — workflows must stay at repo root for GitHub to run them.
# Local: cd twox-frontend-main && npm run verify
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-frontend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, typecheck, production build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: twox-frontend-main
    env:
      CI: true
      NEXT_PUBLIC_BACKEND_API: https://example.com/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: twox-frontend-main/.nvmrc
          cache: npm
          cache-dependency-path: twox-frontend-main/package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        run: rm -rf node_modules && npm install --ignore-scripts --no-audit --no-fund

      - name: Typecheck
        run: npm run type-check

      - name: Build (next build)
        run: npm run build
